<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Formularios Netlify</title>
  </head>
  <body>
    <!-- Formularios ocultos para detección en build de Netlify -->
    <form name="registro-cooperativa" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="registro-cooperativa" />
      <input type="text" name="nombre-cooperativa" />
      <input type="text" name="nombre-comercial" />
      <input type="text" name="giro" />
      <input type="text" name="subcategoria" />
      <textarea name="descripcion-corta"></textarea>
      <textarea name="productos-servicios"></textarea>
      <input type="text" name="zona" />
      <input type="text" name="horario" />
      <input type="tel" name="whatsapp" />
      <input type="email" name="correo" />
      <textarea name="redes-sociales"></textarea>
      <input type="text" name="programa-apoyo" />
      <input type="checkbox" name="autorizacion-publicacion" />
    </form>
    <form name="publicacion-evento-apoyo" data-netlify="true" netlify-honeypot="bot-field-evento" hidden>
      <input type="hidden" name="form-name" value="publicacion-evento-apoyo" />
      <input type="text" name="titulo" />
      <select name="tipo">
        <option value="Evento">Evento</option>
      </select>
      <input type="date" name="fecha" />
      <input type="time" name="hora" />
      <input type="text" name="lugar-modalidad" />
      <input type="text" name="organizador" />
      <textarea name="descripcion"></textarea>
      <textarea name="requisitos"></textarea>
      <input type="url" name="link-registro" />
      <input type="text" name="contacto-responsable" />
      <input type="checkbox" name="aviso-privacidad-evento" />
    </form>
  </body>
</html>
